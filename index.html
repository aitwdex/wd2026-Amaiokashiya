<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>名古屋おでかけノート</title>
    </head>
    <body>
        <header class="container">
            <h1>名古屋おでかけノート</h1>
        </header>
        <main>
            <section class="container mt-5">
                <h2>名古屋の天気</h2>
                <button id="getBtn" class="btn btn-outline-secondary">天気を取得</button>
                <div id="weatherData" class="container mt-3" style="display:none;">
                    <h3>天気</h3>
                    <p id="weather"></p>
                    <h3>気温</h3>
                    <p id="temp"></p>
                    <h3>風速</h3>
                    <p id="wind"></p>
                </div>
            </section>
            <section class="container mt-5">
                <h2>おすすめのおでかけスポット</h2>
                <div class="container">
                    <h3 class="mt-3">大須商店街</h3>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3261.90194977874!2d136.90257300000002!3d35.159065999999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600370cca86bd965%3A0x8be395e24459aa4!2z5aSn6aCI5ZWG5bqX6KGX!5e0!3m2!1sja!2sjp!4v1780987569661!5m2!1sja!2sjp" width="600" height="450" style="border:0;max-width:100%;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    <h3 class="mt-3">星ヶ丘テラス</h3>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3261.8226471238954!2d136.98557169999998!3d35.161043600000006!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6003654e81c2fa99%3A0xa0b9ec261b306105!2z5pif44GM5LiY44OG44Op44K5!5e0!3m2!1sja!2sjp!4v1780997507410!5m2!1sja!2sjp" width="600" height="450" style="border:0;max-width:100%;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    <h3 class="mt-3">名古屋港水族館</h3>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3264.6487214272097!2d136.8784377!3d35.090508799999995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600379a0d3c924b3%3A0xa1a962dc2785debe!2z5ZCN5Y-k5bGL5riv5rC05peP6aSo!5e0!3m2!1sja!2sjp!4v1780997546759!5m2!1sja!2sjp" width="600" height="450" style="border:0;max-width:100%;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </section>
        </main>
        <footer class="container">
            <p class="mt-2 mb-2">Weather data by <a href="https://open-meteo.com/">Open-Meteo.com</a>（CC BY 4.0）</p>
        </footer>
        <script type="module" src="js/main.js"></script>
    </body>
</html>
